name: Update Registry Index

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm build --filter @skillregistry/core --filter @skillregistry/scanner
      - run: pnpm generate:registry
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update registry.json'
          file_pattern: registry.json
