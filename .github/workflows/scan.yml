name: Scan Skills

on:
  pull_request:
    paths:
      - 'skills/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      - run: pnpm turbo run build --filter @skillregistry/core --filter @skillregistry/scanner

      - name: Scan changed skill files
        id: scan
        shell: bash
        run: |
          git diff --name-only --diff-filter=ACMRT \
            "origin/${{ github.base_ref }}...HEAD" \
            -- 'skills/**/SKILL.md' > changed-skills.txt

          node --input-type=module <<'NODE'
          import { appendFileSync, readFileSync, writeFileSync } from 'node:fs';
          import { scanPath } from './packages/scanner/dist/index.js';

          const files = readFileSync('changed-skills.txt', 'utf8')
            .split('\n')
            .map((line) => line.trim())
            .filter(Boolean);

          const lines = ['# SkillRegistry Security Report', ''];
          let failed = false;

          if (files.length === 0) {
            lines.push('No changed SKILL.md files found.');
          }

          for (const file of files) {
            const report = await scanPath(file);
            const status = report.blocked || report.score < 50 ? 'FAIL' : 'PASS';
            if (status === 'FAIL') failed = true;
            lines.push(`## ${file}`);
            lines.push(`- Status: ${status}`);
            lines.push(`- Score: ${report.score}/100`);
            lines.push(`- Blocked: ${report.blocked}`);
            if (report.issues.length === 0) {
              lines.push('- Issues: none');
            } else {
              lines.push('- Issues:');
              for (const issue of report.issues) {
                lines.push(`  - [${issue.severity}] ${issue.code}: ${issue.message}`);
              }
            }
            lines.push('');
          }

          writeFileSync('security-report.md', `${lines.join('\n')}\n`);
          appendFileSync(process.env.GITHUB_OUTPUT, `failed=${failed}\n`);
          NODE

      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('security-report.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail blocked or low-score skills
        if: steps.scan.outputs.failed == 'true'
        run: exit 1
